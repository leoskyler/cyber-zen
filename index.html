<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Zen // Focus Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="zen-container">
        <!-- Top Tech Ribbon -->
        <header class="zen-header">
            <span class="system-id">SYS.LOC: ZEN_CORE</span>
            <span class="status-indicator pulses">CALIBRATING</span>
        </header>

        <!-- Dynamic Breathing Visualizer -->
        <main class="zen-core">
            <div class="visualizer-outer">
                <div class="visualizer-inner" id="breathRing">
                    <div class="timer-display">
                        <span class="timer-digits" id="timeRemaining">10:00</span>
                        <span class="breathing-state" id="breathState">STANDBY</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Tactical Audio Synth Controls -->
        <section class="synth-panel">
            <h3 class="panel-title">PROCEDURAL ATMOSPHERE</h3>
            <div class="control-row">
                <div class="synth-control">
                    <label>COSMIC HUM</label>
                    <button class="synth-toggle" id="humToggle">OFF</button>
                </div>
                <div class="synth-control">
                    <label>CYBER RAIN</label>
                    <button class="synth-toggle" id="rainToggle">OFF</button>
                </div>
            </div>
        </section>

        <!-- Core Operations -->
        <footer class="zen-actions">
            <button class="action-btn" id="sessionBtn">INITIALIZE DEEP WORK</button>
            <button class="action-btn secondary" id="resetBtn">RESET</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
